name: Prepare Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Detect version bump and open release PR
    runs-on: ubuntu-latest

    # Skip if this is a release commit or a merge from a release branch to prevent infinite loop
    if: |
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !contains(github.event.head_commit.message, '/release/v')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine version bump from conventional commits
        id: bump
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
          fi

          echo "Commits since last tag:"
          echo "$COMMITS"

          # Priority: major > minor > patch
          if echo "$COMMITS" | grep -qE "^(feat|fix|refactor|perf)(\(.+\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "Determined bump: ${BUMP}"

      - name: Compute next version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ steps.bump.outputs.bump }}" in
            major) NEXT="$((MAJOR + 1)).0.0" ;;
            minor) NEXT="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac
          echo "next_version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "branch=release/v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${NEXT}"

      - name: Check if release PR already exists
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.version.outputs.branch }}"
          EXISTING=$(gh pr list --base master --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          echo "existing_pr=${EXISTING}" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        if: steps.check_pr.outputs.existing_pr == ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch and bump version
        if: steps.check_pr.outputs.existing_pr == ''
        run: |
          BRANCH="${{ steps.version.outputs.branch }}"
          # Delete stale remote branch if it exists (e.g. from a previously closed PR)
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version
          git add package.json pnpm-lock.yaml
          git commit -m "chore(release): ${{ steps.version.outputs.tag }}"
          git push origin "$BRANCH"

      - name: Ensure "release" label exists
        if: steps.check_pr.outputs.existing_pr == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "release" --color "0075ca" --description "Automated release PR" 2>/dev/null || true

      - name: Open release PR
        if: steps.check_pr.outputs.existing_pr == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG_URL="https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${{ steps.version.outputs.tag }}"
          else
            CHANGELOG_URL="https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.tag }}"
          fi

          gh pr create \
            --base master \
            --head "${{ steps.version.outputs.branch }}" \
            --title "chore(release): ${{ steps.version.outputs.tag }}" \
            --label "release" \
            --body "## Release ${{ steps.version.outputs.tag }}

          **Bump type:** \`${{ steps.bump.outputs.bump }}\`

          **Full Changelog:** ${CHANGELOG_URL}

          ---
          > This PR was auto-generated by the Prepare Release workflow.
          > Merge this PR to trigger the GitHub Release creation."
