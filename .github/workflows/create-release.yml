name: Create Release

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    name: Create git tag and GitHub Release
    runs-on: ubuntu-latest

    # Only run when a release-labeled PR is merged
    if: |
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push git tag
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Determine previous tag for changelog link
        id: prev_tag
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev_tag=${PREV}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            ## ${{ steps.version.outputs.tag }}

            **Full Changelog:** ${{ steps.prev_tag.outputs.prev_tag != '' && format('https://github.com/{0}/compare/{1}...{2}', github.repository, steps.prev_tag.outputs.prev_tag, steps.version.outputs.tag) || format('https://github.com/{0}/commits/{1}', github.repository, steps.version.outputs.tag) }}
      - name: Deploy to Vercel Production
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" | grep -q "201" \
            && echo "✅ Vercel deploy triggered" \
            || { echo "❌ Failed to trigger Vercel deploy"; exit 1; }
